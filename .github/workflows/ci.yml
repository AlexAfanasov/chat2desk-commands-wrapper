name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run handoff checks + consumer smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/check-handoff.ps1

      - name: Run handoff checks + consumer smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/check-handoff.sh

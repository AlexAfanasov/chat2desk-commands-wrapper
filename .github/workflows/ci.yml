name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run handoff checks + consumer smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/check-handoff.ps1

      - name: Run handoff checks + consumer smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/check-handoff.sh

  ios-kmp:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Compile iOS KMP targets
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew \
            :wrapper:metadataCommonMainClasses \
            :wrapper:compileKotlinIosX64 \
            :wrapper:compileKotlinIosArm64 \
            :wrapper:compileKotlinIosSimulatorArm64 \
            --no-daemon \
            --console=plain

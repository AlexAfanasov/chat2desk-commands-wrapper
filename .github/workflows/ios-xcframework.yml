name: Build iOS XCFramework

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "XCFramework build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-ios-xcframework:
    name: Build iOS XCFramework
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Show environment
        shell: bash
        run: |
          xcodebuild -version
          java -version
          ./gradlew -version

      - name: Verify common and iOS targets
        shell: bash
        run: |
          ./gradlew \
            :wrapper:metadataCommonMainClasses \
            :wrapper:compileKotlinIosX64 \
            :wrapper:compileKotlinIosArm64 \
            :wrapper:compileKotlinIosSimulatorArm64 \
            --no-daemon \
            --console=plain

      - name: List XCFramework tasks
        shell: bash
        run: ./gradlew :wrapper:tasks --all --no-daemon --console=plain | grep -i xcframework || true

      - name: Build Debug XCFramework
        if: ${{ inputs.build_type == 'debug' }}
        shell: bash
        run: |
          ./gradlew \
            :wrapper:assembleChat2DeskCommandsWrapperDebugXCFramework \
            --no-daemon \
            --console=plain

      - name: Build Release XCFramework
        if: ${{ inputs.build_type == 'release' }}
        shell: bash
        run: |
          ./gradlew \
            :wrapper:assembleChat2DeskCommandsWrapperReleaseXCFramework \
            --no-daemon \
            --console=plain

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="build/ios-artifacts"
          framework_path="wrapper/build/XCFrameworks/${{ inputs.build_type }}/Chat2DeskCommandsWrapper.xcframework"
          zip_path="${artifact_dir}/Chat2DeskCommandsWrapper-${{ inputs.build_type }}.xcframework.zip"

          test -d "$framework_path"
          mkdir -p "$artifact_dir"
          cp -R "$framework_path" "$artifact_dir/"

          cd "$artifact_dir"
          zip -r "$(basename "$zip_path")" Chat2DeskCommandsWrapper.xcframework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chat2DeskCommandsWrapper-${{ inputs.build_type }}-xcframework
          path: build/ios-artifacts/Chat2DeskCommandsWrapper-${{ inputs.build_type }}.xcframework.zip
          retention-days: 14
